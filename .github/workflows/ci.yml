name: CI

on:
  push:
  pull_request:

jobs:
  rust:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            ripgrep \
            pkg-config \
            libturbojpeg0-dev \
            libglib2.0-dev \
            libgtk-3-dev \
            libxkbcommon-dev \
            libxcb-render0-dev \
            libxcb-shape0-dev \
            libxcb-xfixes0-dev

      - name: Install macOS system dependencies
        if: runner.os == 'macOS'
        run: |
          brew update
          brew install jpeg-turbo pkg-config ripgrep

      - name: Install Windows system dependencies
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          choco install ripgrep -y --no-progress

      - name: Verify libturbojpeg install
        if: runner.os != 'Windows'
        shell: bash
        run: |
          pkg-config --modversion libturbojpeg

      - name: Cargo check
        run: cargo check --all-targets

      - name: Cargo test (includes perf smoke) with perf log capture
        if: runner.os == 'Linux'
        run: |
          set -euo pipefail
          RUST_LOG=imranview::perf=debug cargo test --all-targets -- --nocapture 2>&1 | tee perf.log

      - name: Perf regression gate
        if: runner.os == 'Linux'
        run: ./scripts/perf_gate.sh perf.log
