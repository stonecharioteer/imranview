name: Manual Release

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: manual-release
  cancel-in-progress: false

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
      release_name: ${{ steps.version.outputs.release_name }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve release version (semver-compatible YYYY.M.D-N)
        id: version
        shell: bash
        run: |
          set -euo pipefail
          git fetch --tags --force

          # Keep semver core to exactly three numeric components and use
          # prerelease suffix for same-day increments.
          base="$(date -u +%Y.%-m.%-d)"
          max_idx=-1
          while IFS= read -r tag; do
            if [[ "$tag" =~ ^${base//./\\.}-([0-9]+)$ ]]; then
              value="${BASH_REMATCH[1]}"
              if (( value > max_idx )); then
                max_idx=$value
              fi
            fi
          done < <(git tag -l "${base}-*")

          next=$((max_idx + 1))
          version="${base}-${next}"

          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=$version" >> "$GITHUB_OUTPUT"
          echo "release_name=ImranView $version" >> "$GITHUB_OUTPUT"
          echo "Resolved release version: $version"

  build:
    needs:
      - prepare
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: linux-appimage
            artifact_glob: dist/*.AppImage
          - os: macos-latest
            artifact_name: macos-dmg
            artifact_glob: dist/*.dmg
          - os: windows-latest
            artifact_name: windows-nsis
            artifact_glob: dist/*setup.exe

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            libturbojpeg0-dev \
            libglib2.0-dev \
            libgtk-3-dev \
            libxdo-dev \
            libxkbcommon-dev \
            libxcb-render0-dev \
            libxcb-shape0-dev \
            libxcb-xfixes0-dev \
            curl

      - name: Install macOS system dependencies
        if: runner.os == 'macOS'
        shell: bash
        run: |
          set -euo pipefail
          brew update
          brew install jpeg-turbo pkg-config

      - name: Install Windows system dependencies
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          choco install ripgrep -y --no-progress

      - name: Verify libturbojpeg
        if: runner.os != 'Windows'
        shell: bash
        run: |
          pkg-config --modversion libturbojpeg

      - name: Build and package AppImage
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euo pipefail
          cargo build --release
          ./scripts/release/package_appimage.sh "${{ needs.prepare.outputs.version }}"

      - name: Build and package DMG
        if: runner.os == 'macOS'
        shell: bash
        run: |
          set -euo pipefail
          cargo build --release
          ./scripts/release/package_dmg.sh "${{ needs.prepare.outputs.version }}"

      - name: Install NSIS
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          choco install nsis -y --no-progress

      - name: Build and package Windows installer
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          cargo build --release
          New-Item -ItemType Directory -Force -Path dist | Out-Null

          $version = '${{ needs.prepare.outputs.version }}'
          $outFile = "dist/imranview-$version-windows-x86_64-setup.exe"
          $bin = "target/release/imranview.exe"
          $nsis = "${env:ProgramFiles(x86)}\\NSIS\\makensis.exe"

          if (!(Test-Path $bin)) {
            throw "Windows packaging failed: binary not found at $bin"
          }
          if (!(Test-Path $nsis)) {
            throw "Windows packaging failed: NSIS not found at $nsis"
          }

          & $nsis /DVERSION=$version /DOUTFILE=$outFile /DBIN=$bin scripts\\windows\\installer.nsi

      - name: Upload packaged artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_glob }}

  publish:
    needs:
      - prepare
      - build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 0

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Flatten packaged files
        shell: bash
        run: |
          set -euo pipefail
          find dist -type f \( -name '*.AppImage' -o -name '*.dmg' -o -name '*setup.exe' \) -exec cp {} . \;

          shopt -s nullglob
          artifacts=( *.AppImage *.dmg *setup.exe )
          if (( ${#artifacts[@]} == 0 )); then
            echo "no packaged artifacts found" >&2
            exit 1
          fi

          echo "Artifacts to release:"
          printf ' - %s\n' "${artifacts[@]}"

      - name: Bump Cargo.toml version and push
        shell: bash
        run: |
          set -euo pipefail

          version='${{ needs.prepare.outputs.version }}'
          branch='${{ github.ref_name }}'

          awk -v version="$version" '
            BEGIN { in_package = 0; replaced = 0 }
            /^\[package\]$/ { in_package = 1; print; next }
            in_package && /^\[/ && $0 != "[package]" { in_package = 0 }
            in_package && !replaced && $0 ~ /^version[[:space:]]*=[[:space:]]*"[^"]+"/ {
              sub(/"[^"]+"/, "\"" version "\"")
              replaced = 1
            }
            { print }
            END {
              if (!replaced) {
                print "failed to locate [package] version in Cargo.toml" > "/dev/stderr"
                exit 2
              }
            }
          ' Cargo.toml > Cargo.toml.tmp
          mv Cargo.toml.tmp Cargo.toml

          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add Cargo.toml

          if git diff --cached --quiet; then
            echo "Cargo.toml already at release version $version"
          else
            git commit -m "chore(release): cut $version"
            git push origin "HEAD:$branch"
          fi

      - name: Create and push release tag
        shell: bash
        run: |
          set -euo pipefail
          tag='${{ needs.prepare.outputs.tag }}'

          git fetch --tags --force
          if git rev-parse -q --verify "refs/tags/$tag" >/dev/null; then
            echo "tag $tag already exists" >&2
            exit 1
          fi

          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git tag "$tag"
          git push origin "refs/tags/$tag"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.tag }}
          name: ${{ needs.prepare.outputs.release_name }}
          generate_release_notes: true
          files: |
            *.AppImage
            *.dmg
            *setup.exe
